name: Deploy preview

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      stack-name:
        description: The deployed stack name
        value: ${{ jobs.deploy.outputs.stack-name }}
      aws-region:
        description: The region in which the stack was deployed
        value: ${{ jobs.deploy.outputs.aws-region }}

jobs:
  build:
    name: Build SAM app
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      cache-key: ${{ steps.build.outputs.cache-key }}
      cache-restore-keys: ${{ steps.build.outputs.cache-restore-keys }}
    environment:
      name: development
    steps:
      - name: Install latest SAM
        uses: aws-actions/setup-sam@d78e1a4a9656d3b223e59b80676a797f20093133
        with:
          version: 1.159.1

      - name: Build SAM application
        uses: govuk-one-login/github-actions/sam/build-application@4c76410195b5fcb1804fc7c183ed20704252830f
        id: build
        with:
          template: infrastructure/template.yaml
          cache-name: check-hmrc-api
          pull-repository: true
          source-dir: lambdas
          aws-role-arn: ${{ vars.DEPLOYMENT_ROLE_ARN }}

  deploy:
    name: Deploy stack
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      id-token: write
      contents: read
    needs: build
    concurrency:
      group: deploy-development-${{ github.head_ref || github.ref_name }}
    environment:
      name: development
      url: ${{ steps.deploy.outputs.stack-url }}
    outputs:
      aws-region: ${{ steps.deploy.outputs.aws-region }}
      stack-name: ${{ steps.deploy.outputs.stack-name }}
    steps:
      - name: Install SAM CLI
        uses: aws-actions/setup-sam@d78e1a4a9656d3b223e59b80676a797f20093133
        with:
          version: 1.159.1
      - name: Deploy stack
        uses: govuk-one-login/github-actions/sam/deploy-stack@4c76410195b5fcb1804fc7c183ed20704252830f
        id: deploy
        with:
          sam-deployment-bucket: ${{ vars.DEPLOYMENT_ARTIFACTS_BUCKET }}
          aws-role-arn: ${{ vars.DEPLOYMENT_ROLE_ARN }}
          stack-name-prefix: preview
          cache-key: ${{ needs.build.outputs.cache-key }}
          cache-restore-keys: ${{ needs.build.outputs.cache-restore-keys }}
          s3-prefix: preview
          pull-repository: true
          delete-failed-stack: true
          tags: |
            cri:component=ipv-cri-check-hmrc-api
            cri:stack-type=preview
            cri:application=Orange
            cri:deployment-source=github-actions
          parameters: |
            Environment=localdev
